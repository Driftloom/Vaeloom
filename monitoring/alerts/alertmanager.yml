route:
  receiver: default
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: pagerduty-critical
      repeat_interval: 15m
      continue: true

    - match:
        severity: critical
      receiver: slack-critical
      continue: true

    - match:
        severity: warning
      receiver: slack-warning

    - match:
        severity: warning
      receiver: email-warning

receivers:
  - name: default
    email_configs:
      - to: '{{ .ExternalURL }}'
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - api_url: '{{ env "SLACK_WEBHOOK_URL" }}'
        channel: '#alerts-critical'
        title: '{{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Severity:* {{ .Labels.severity }}
            *Service:* {{ .Labels.service }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Graph:* {{ .GeneratorURL }}
          {{ end }}
        send_resolved: true
        color: danger

  - name: slack-warning
    slack_configs:
      - api_url: '{{ env "SLACK_WEBHOOK_URL" }}'
        channel: '#alerts-warning'
        title: '{{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Severity:* {{ .Labels.severity }}
            *Service:* {{ .Labels.service }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: warning

  - name: email-warning
    email_configs:
      - to: '{{ env "ALERT_EMAIL_TO" }}'
        from: '{{ env "ALERT_EMAIL_FROM" }}'
        smarthost: '{{ env "ALERT_SMTP_HOST" }}:{{ env "ALERT_SMTP_PORT" }}'
        auth_username: '{{ env "ALERT_SMTP_USER" }}'
        auth_password: '{{ env "ALERT_SMTP_PASS" }}'
        require_tls: true
        send_resolved: true
        headers:
          subject: '[Vaeloom Warning] {{ .GroupLabels.alertname }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: '{{ env "PAGERDUTY_ROUTING_KEY" }}'
        severity: critical
        description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'
        client: Vaeloom Monitoring
        client_url: '{{ .ExternalURL }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          group_labels: '{{ .GroupLabels }}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['service', 'instance']

  - source_match:
      alertname: ServiceDown
    target_match:
      severity: warning
    equal: ['service', 'instance']
