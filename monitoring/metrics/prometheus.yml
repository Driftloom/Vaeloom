global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts/*.yml'

scrape_configs:
  - job_name: 'vaeloom-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:4000']
        labels:
          service: 'api'

  - job_name: 'vaeloom-web'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['web:3000']
        labels:
          service: 'web'

  - job_name: 'vaeloom-ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8000']
        labels:
          service: 'ai-service'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
