[databases]
vaeloom = host=postgres port=5432 dbname=vaeloom pool_size=25

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

# Pool configuration
pool_mode = transaction
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3.0
max_client_conn = 200
max_db_connections = 50

# Timeouts
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 10

# Connection tuning
server_round_robin = 0
tcp_defer_accept = 1
tcp_socket_buffer = 0
pkt_buf = 4096
sbuf_loopcnt = 5

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
verbose = 0
