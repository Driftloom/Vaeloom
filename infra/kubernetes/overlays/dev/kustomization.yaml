apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaeloom
bases:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: .*
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: debug
configMapGenerator:
  - name: vaeloom-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      - API_RATE_LIMIT=200
