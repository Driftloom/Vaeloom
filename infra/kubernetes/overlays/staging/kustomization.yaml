apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaeloom
bases:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: .*
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
configMapGenerator:
  - name: vaeloom-config
    behavior: merge
    literals:
      - LOG_LEVEL=info
