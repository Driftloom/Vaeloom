apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaeloom-connector-service
  namespace: vaeloom
  labels:
    app.kubernetes.io/name: connector-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: connector-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: connector-service
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3100'
    spec:
      containers:
        - name: connector-service
          image: vaeloom/connector-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3100
              name: http
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: vaeloom-config
                  key: NODE_ENV
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 5
