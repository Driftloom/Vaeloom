apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaeloom-ai-service
  namespace: vaeloom
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/component: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: ai-service
          image: vaeloom/ai-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SERVICE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: vaeloom-config
                  key: NODE_ENV
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vaeloom-ai-secret
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
