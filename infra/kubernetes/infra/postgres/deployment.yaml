apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vaeloom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: vaeloom
            - name: POSTGRES_USER
              value: vaeloom
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaeloom-db-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
