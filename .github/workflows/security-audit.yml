name: Security Audit

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'Docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Docs/**'
      - '**.md'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  pnpm-audit:
    name: pnpm audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Check allowed packages
        run: node -e "
          const config = require('./security-audit.config.js');
          const { execSync } = require('child_process');
          const audit = JSON.parse(execSync('pnpm audit --json').toString());
          const advisories = audit.advisories || {};
          const allowed = config.allowedAdvisories || [];
          const violations = Object.entries(advisories)
            .filter(([id]) => !allowed.includes(id))
            .map(([id, adv]) => \`- \${adv.module_name}@\${adv.vulnerable_versions}: \${adv.overview}\`);
          if (violations.length > 0) {
            console.log('SECURITY VIOLATIONS:', JSON.stringify(violations, null, 2));
            process.exit(1);
          }
          console.log('No unapproved vulnerabilities found.');
        "

  pip-audit:
    name: pip-audit (ai-service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies
        working-directory: apps/ai-service
        run: pip-audit -r <(grep -v '^#' pyproject.toml | grep -oP '"[^"]+>=\d+' | tr -d '"' | sed 's/>=.*//') || true

  gitleaks:
    name: Gitleaks secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-diff:
    name: Dependency diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check outdated packages
        run: |
          echo "## Dependency Status" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pnpm outdated --format json 2>/dev/null | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const table = ['| Package | Current | Latest | Type |'];
            table.push('|---------|---------|--------|------|');
            for (const [pkg, info] of Object.entries(data)) {
              table.push(\`| \${pkg} | \${info.current} | \${info.latest} | \${info.type} |\`);
            }
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, table.join('\\n'));
          " || echo "All packages up to date."

  summary:
    name: Generate Security Summary
    needs: [pnpm-audit, pip-audit, gitleaks, dependency-diff]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Security Audit Summary',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| pnpm audit (high/critical) | ${{ needs.pnpm-audit.result }} |',
              '| pip-audit (ai-service) | ${{ needs.pip-audit.result }} |',
              '| Gitleaks secrets scan | ${{ needs.gitleaks.result }} |',
              '| Dependency version diff | ${{ needs.dependency-diff.result }} |',
              '',
              'Review details in the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            ].join('\\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
