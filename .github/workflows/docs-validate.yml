name: Docs Validation

on:
  pull_request:
    paths:
      - "Docs/**"
      - "docs/**"

jobs:
  validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vale Lint
        uses: errata-ai/vale-action@v2
        with:
          files: Docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "Docs/**/*.md"

      - name: Check Broken Links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress Docs/**/*.md

      - name: Validate Document Structure
        run: |
          $missing = @()
          Get-ChildItem -Recurse -Filter "*.md" -Path Docs | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            if (-not ($content -match "^# ")) { $missing += "$_`: missing h1" }
            if (-not ($content -match "```mermaid")) { $missing += "$_`: missing mermaid diagram" }
            if (-not ($content -match "^> \*\*Status:\*\*")) { $missing += "$_`: missing metadata header" }
          }
          if ($missing.Count -gt 0) {
            $missing | ForEach-Object { Write-Warning $_ }
          }
