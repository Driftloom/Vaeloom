# Vale configuration for Meridian documentation
# See https://vale.sh/docs/

StylesPath = .vale/styles
MinAlertLevel = suggestion

# Downloadable style packages
Packages = write-good

# Ignored scopes
IgnoredScopes = code, code_block, script, style, pre, img, inline_code

[*.md]
# Use Meridian custom style for project-specific rules
# write-good provides general prose suggestions
BasedOnStyles = Meridian, write-good

# ── Meridian custom style ──────────────────
# Project-specific terminology and capitalization (strict)
Meridian.Terms.level = error
Meridian.ProductNames.level = error
Meridian.Weasel.level = warning
Meridian.Passive.level = suggestion
Meridian.SentenceLength.level = suggestion

# ── write-good style (general prose) ──────
# Set to suggestion so CI doesn't block on general writing advice
write-good.E-Prime.level = suggestion
write-good.ThereIs.level = suggestion
write-good.Weasel.level = warning
write-good.Passive.level = suggestion
write-good.Illusions.level = suggestion
write-good.So.level = suggestion
write-good.TooWordy.level = warning
write-good.Cliches.level = warning
